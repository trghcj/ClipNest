<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 300px;
      margin: 0;
      padding: 16px;
      background-color: #ffffff;
      color: #0f172a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 24px;
      height: 24px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .info-box {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .url-text {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0 0 4px 0;
    }
    .page-title {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #10b981; /* primary color */
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #059669;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon.png" alt="ClipNest" class="logo">
    <h1 class="title">ClipNest</h1>
  </div>
  
  <div class="info-box">
    <p class="url-text" id="urlDisplay">Loading...</p>
    <p class="page-title" id="titleDisplay">Loading page details...</p>
  </div>
  
  <button class="btn" id="saveBtn">Save to Library</button>

  <script src="popup.js"></script>
</body>
</html>
